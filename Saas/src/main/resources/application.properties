spring.application.name=saas
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/new
spring.datasource.username=postgres
spring.datasource.password=5432
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

whatsapp.meta.verify-token=my_verify_token_123
whatsapp.meta.phone-number-id=1018427251362259
whatsapp.meta.waba-id=894183750336965
whatsapp.meta.access-token=${WHATSAPP_META_ACCESS_TOKEN}

logging.level.org.springframework.web=INFO
logging.level.com.rohit=DEBUG